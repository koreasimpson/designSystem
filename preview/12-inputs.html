<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:13px;font-weight:500;color:var(--fg-2)}
  .field input{height:44px;padding:0 14px;border:1px solid var(--border-2);border-radius:12px;font-family:var(--font-sans);font-size:15px;background:var(--bg-1);color:var(--fg-1);outline:none;transition:all 150ms}
  .field input:focus{border-color:var(--primary-500);box-shadow:0 0 0 3px rgba(245,158,11,.25)}
  .field--error input{border-color:#EF4444}
  .field .help{font-size:12px;color:var(--fg-3)}
  .field--error .help{color:#EF4444}
</style>
</head>
<body><div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="field">
      <label>이메일</label>
      <input type="email" value="hello@ninezerochan.dev">
      <span class="help">로그인에 사용해요</span>
    </div>
    <div class="field field--error">
      <label>비밀번호</label>
      <input type="password" value="abc">
      <span class="help">8자 이상으로 입력해 주세요</span>
    </div>
  </div>
</div></body></html>
