<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div style="border:1px solid var(--border-1);border-radius:12px;padding:18px;background:var(--bg-1)">
      <div class="caption" style="font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--fg-3)">PROJECT</div>
      <div style="font-size:18px;font-weight:600;margin-top:4px;letter-spacing:-0.01em">Train Reservation</div>
      <div class="caption" style="margin-top:6px">토스 면접 과제로 만든 KTX 예약 화면 클론</div>
      <div style="display:flex;gap:6px;margin-top:14px">
        <span style="font-size:11px;padding:4px 8px;border-radius:8px;background:var(--gray-100);color:var(--fg-2)">React</span>
        <span style="font-size:11px;padding:4px 8px;border-radius:8px;background:var(--gray-100);color:var(--fg-2)">TypeScript</span>
      </div>
    </div>
    <div style="border:1px solid var(--border-1);border-radius:12px;padding:18px;background:var(--bg-1)">
      <div class="caption" style="font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--fg-3)">POST</div>
      <div style="font-size:18px;font-weight:600;margin-top:4px;letter-spacing:-0.01em">왜 토스 블루를 피했을까</div>
      <div class="caption" style="margin-top:6px">개인 브랜드는 친근함을 비틀어 만들어요</div>
      <div class="numeric caption" style="margin-top:14px;font-family:Inter">2026.04.20 · 4분</div>
    </div>
  </div>
</div></body></html>
