<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div style="border:1px solid #BBF7D0;background:#F0FDF4;border-radius:12px;padding:14px 16px">
      <div style="font-size:11px;font-weight:700;color:#15803D;letter-spacing:.04em;margin-bottom:8px">DO</div>
      <div style="font-size:14px;line-height:1.6">"다시 시도해 주세요"</div>
      <div style="font-size:14px;line-height:1.6">"저장했어요"</div>
      <div style="font-size:14px;line-height:1.6">"비밀번호는 8자 이상이어야 해요"</div>
    </div>
    <div style="border:1px solid #FECACA;background:#FEF2F2;border-radius:12px;padding:14px 16px">
      <div style="font-size:11px;font-weight:700;color:#B91C1C;letter-spacing:.04em;margin-bottom:8px">DON'T</div>
      <div style="font-size:14px;line-height:1.6;text-decoration:line-through;color:var(--fg-2)">"오류가 발생했습니다"</div>
      <div style="font-size:14px;line-height:1.6;text-decoration:line-through;color:var(--fg-2)">"저장이 완료되었습니다"</div>
      <div style="font-size:14px;line-height:1.6;text-decoration:line-through;color:var(--fg-2)">"비밀번호 형식 오류"</div>
    </div>
  </div>
  <div class="caption" style="margin-top:12px">해요체 · 부정형보다 긍정형 · 책망보다 안내</div>
</div></body></html>
