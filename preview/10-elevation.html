<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div style="display:flex;gap:20px;align-items:center;padding:8px 0 16px">
    <div style="text-align:center">
      <div style="width:120px;height:72px;background:var(--bg-1);border:1px solid var(--border-1);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--fg-3)">border-only</div>
      <div class="mono caption" style="margin-top:8px;font-size:10px">기본 카드</div>
    </div>
    <div style="text-align:center">
      <div style="width:120px;height:72px;background:var(--bg-1);border:1px solid var(--border-1);border-radius:12px;box-shadow:0 1px 2px rgba(9,9,11,.04);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--fg-3)">shadow-1</div>
      <div class="mono caption" style="margin-top:8px;font-size:10px">토스트</div>
    </div>
    <div style="text-align:center">
      <div style="width:120px;height:72px;background:var(--bg-1);border:1px solid var(--border-1);border-radius:12px;box-shadow:0 4px 12px rgba(9,9,11,.06);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--fg-3)">shadow-2</div>
      <div class="mono caption" style="margin-top:8px;font-size:10px">모달·드롭다운</div>
    </div>
    <div style="text-align:center">
      <div style="width:120px;height:72px;background:var(--bg-1);border:1px solid var(--border-1);border-radius:12px;box-shadow:0 0 0 3px rgba(245,158,11,.30);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--fg-3)">focus ring</div>
      <div class="mono caption" style="margin-top:8px;font-size:10px">키보드 포커스</div>
    </div>
  </div>
</div></body></html>
