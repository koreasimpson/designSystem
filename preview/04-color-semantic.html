<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
    <div style="border:1px solid var(--border-1);border-radius:12px;overflow:hidden">
      <div style="background:#10B981;height:48px"></div>
      <div style="padding:10px 12px;background:#ECFDF5">
        <div style="font-size:13px;font-weight:600">Success</div>
        <div class="mono caption" style="font-size:11px">#10B981</div>
      </div>
    </div>
    <div style="border:1px solid var(--border-1);border-radius:12px;overflow:hidden">
      <div style="background:#F59E0B;height:48px"></div>
      <div style="padding:10px 12px;background:#FFFBEB">
        <div style="font-size:13px;font-weight:600">Warning</div>
        <div class="mono caption" style="font-size:11px">#F59E0B</div>
      </div>
    </div>
    <div style="border:1px solid var(--border-1);border-radius:12px;overflow:hidden">
      <div style="background:#EF4444;height:48px"></div>
      <div style="padding:10px 12px;background:#FEF2F2">
        <div style="font-size:13px;font-weight:600">Error</div>
        <div class="mono caption" style="font-size:11px">#EF4444</div>
      </div>
    </div>
    <div style="border:1px solid var(--border-1);border-radius:12px;overflow:hidden">
      <div style="background:#6366F1;height:48px"></div>
      <div style="padding:10px 12px;background:#EEF2FF">
        <div style="font-size:13px;font-weight:600">Info</div>
        <div class="mono caption" style="font-size:11px">#6366F1</div>
      </div>
    </div>
  </div>
</div></body></html>
