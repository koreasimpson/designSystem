<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>코리안심슨 · Personal</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="icon" href="../../assets/logo.svg">
  <style>
    body { margin: 0; }
    main { max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .section-title { font-size: 13px; color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; margin: 48px 0 16px; }
    .filter-bar { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-bar button { background: var(--bg-1); border: 1px solid var(--border-2); color: var(--fg-2); height: 32px; padding: 0 14px; border-radius: 999px; font-size: 13px; font-family: var(--font-sans); cursor: pointer; transition: all 150ms; }
    .filter-bar button.active { background: var(--gray-900); border-color: var(--gray-900); color: #fff; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
// Button.jsx — 4 variants matching design system
function Button({ variant = 'primary', children, onClick, disabled, icon, ...rest }) {
  const styles = {
    primary: { background: 'var(--primary-500)', color: '#fff', borderColor: 'transparent' },
    secondary: { background: 'var(--bg-1)', color: 'var(--fg-1)', borderColor: 'var(--border-2)' },
    ghost: { background: 'transparent', color: 'var(--fg-1)', borderColor: 'transparent' },
    danger: { background: 'var(--bg-1)', color: '#EF4444', borderColor: '#FCA5A5' },
  }[variant];
  return (
    <button onClick={onClick} disabled={disabled} {...rest} style={{
      ...styles, height: 44, padding: '0 18px', borderRadius: 12,
      border: '1px solid', display: 'inline-flex', alignItems: 'center', gap: 8,
      fontFamily: 'var(--font-sans)', fontSize: 15, fontWeight: 600,
      cursor: disabled ? 'not-allowed' : 'pointer', opacity: disabled ? 0.45 : 1,
      transition: 'all 200ms cubic-bezier(.22,1,.36,1)',
    }}
    onMouseEnter={e => {
      if (disabled) return;
      if (variant === 'primary') e.currentTarget.style.background = 'var(--primary-600)';
      else if (variant === 'secondary' || variant === 'ghost') e.currentTarget.style.background = 'var(--gray-100)';
      else if (variant === 'danger') e.currentTarget.style.background = '#FEF2F2';
    }}
    onMouseLeave={e => {
      e.currentTarget.style.background = styles.background;
    }}>
      {icon && <img src={icon} width="18" height="18" alt="" style={{ filter: variant === 'primary' ? 'invert(1) brightness(2)' : 'none' }} />}
      {children}
    </button>
  );
}

window.Button = Button;

</script>
  <script type="text/babel">
// Tag.jsx
function Tag({ children, selected }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', height: 26,
      padding: '0 12px', borderRadius: 999, fontSize: 12, fontWeight: 500,
      border: '1px solid',
      borderColor: selected ? 'var(--gray-900)' : 'var(--border-2)',
      background: selected ? 'var(--gray-900)' : 'var(--bg-1)',
      color: selected ? '#fff' : 'var(--fg-2)',
      fontFamily: 'var(--font-sans)',
    }}>{children}</span>
  );
}
window.Tag = Tag;

</script>
  <script type="text/babel">
// Header.jsx — fixed top nav with backdrop blur
function Header({ route, onNav }) {
  const items = [
    { id: 'home', label: 'Home' },
    { id: 'projects', label: 'Projects' },
    { id: 'writing', label: 'Writing' },
    { id: 'about', label: 'About' },
  ];
  return (
    <header style={{
      position: 'sticky', top: 0, zIndex: 10,
      backdropFilter: 'blur(12px)',
      WebkitBackdropFilter: 'blur(12px)',
      background: 'rgba(255,255,255,0.8)',
      borderBottom: '1px solid var(--border-1)',
    }}>
      <div style={{
        maxWidth: 1100, margin: '0 auto',
        padding: '0 24px', height: 60,
        display: 'flex', alignItems: 'center', gap: 24,
      }}>
        <button onClick={() => onNav('home')} style={{
          display: 'flex', alignItems: 'center', gap: 10,
          background: 'none', border: 'none', cursor: 'pointer', padding: 0,
        }}>
          <img src="../../assets/logo.svg" width="24" height="24" alt="" />
          <span style={{ fontWeight: 700, letterSpacing: '-0.01em', fontSize: 16 }}>코리안심슨</span>
        </button>
        <nav style={{ display: 'flex', gap: 4, marginLeft: 'auto' }}>
          {items.map(i => (
            <button key={i.id} onClick={() => onNav(i.id)} style={{
              height: 36, padding: '0 14px', border: 'none', borderRadius: 8,
              background: route === i.id ? 'var(--gray-100)' : 'transparent',
              color: route === i.id ? 'var(--fg-1)' : 'var(--fg-2)',
              fontFamily: 'var(--font-sans)', fontSize: 14, fontWeight: 500,
              cursor: 'pointer', transition: 'all 150ms',
            }}>{i.label}</button>
          ))}
        </nav>
      </div>
    </header>
  );
}

window.Header = Header;

</script>
  <script type="text/babel">
// Hero.jsx — homepage intro
function Hero() {
  return (
    <section style={{ padding: '80px 0 48px', maxWidth: 720 }}>
      <div style={{ fontSize: 13, color: 'var(--fg-3)', marginBottom: 16, letterSpacing: '0.02em' }}>
        FRONTEND · SEOUL
      </div>
      <h1 style={{
        fontSize: 44, lineHeight: 1.25, fontWeight: 700,
        letterSpacing: '-0.02em', margin: 0,
      }}>
        한 화면에 하나의 핵심,<br />
        <span style={{ color: 'var(--primary-600)' }}>코리안심슨</span>이 만드는 인터페이스.
      </h1>
      <p style={{
        fontSize: 17, lineHeight: 1.6, color: 'var(--fg-2)',
        marginTop: 20, maxWidth: 580,
      }}>
        에러는 책망이 아닌 안내라고 믿어요.
        토스의 사고방식을 빌려, 개인 사이드 프로젝트를 정리한 공간이에요.
      </p>
      <div style={{ display: 'flex', gap: 8, marginTop: 28 }}>
        <Button variant="primary">프로젝트 보기</Button>
        <Button variant="secondary">이메일 보내기</Button>
      </div>
    </section>
  );
}
window.Hero = Hero;

</script>
  <script type="text/babel">
// ProjectCard.jsx
function ProjectCard({ kicker, title, description, tags, year }) {
  const [hover, setHover] = React.useState(false);
  return (
    <article
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        border: '1px solid var(--border-1)', borderRadius: 12,
        padding: 22, background: 'var(--bg-1)',
        cursor: 'pointer',
        boxShadow: hover ? '0 4px 12px rgba(9,9,11,.06)' : 'none',
        transform: hover ? 'translateY(-1px)' : 'none',
        transition: 'all 200ms cubic-bezier(.22,1,.36,1)',
      }}>
      <div style={{
        fontSize: 11, letterSpacing: '0.06em', textTransform: 'uppercase',
        color: 'var(--fg-3)',
      }}>{kicker}</div>
      <h3 style={{
        fontSize: 20, fontWeight: 600, letterSpacing: '-0.01em',
        margin: '6px 0 0',
      }}>{title}</h3>
      <p style={{
        fontSize: 14, lineHeight: 1.6, color: 'var(--fg-2)',
        margin: '8px 0 0',
      }}>{description}</p>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8,
        marginTop: 16, justifyContent: 'space-between',
      }}>
        <div style={{ display: 'flex', gap: 6 }}>
          {tags.map(t => <Tag key={t}>{t}</Tag>)}
        </div>
        <span style={{
          fontSize: 12, color: 'var(--fg-3)',
          fontFamily: 'Inter', fontFeatureSettings: '"tnum" 1',
        }}>{year}</span>
      </div>
    </article>
  );
}
window.ProjectCard = ProjectCard;

</script>
  <script type="text/babel">
// PostListItem.jsx
function PostListItem({ title, excerpt, date, readTime }) {
  return (
    <a href="#" style={{
      display: 'block', textDecoration: 'none', color: 'inherit',
      padding: '20px 0', borderBottom: '1px solid var(--border-1)',
    }}
    onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-2)'}
    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
      <div style={{ padding: '0 8px' }}>
        <h3 style={{
          fontSize: 18, fontWeight: 600, letterSpacing: '-0.01em',
          margin: 0,
        }}>{title}</h3>
        <p style={{
          fontSize: 14, lineHeight: 1.6, color: 'var(--fg-2)',
          margin: '6px 0 0',
        }}>{excerpt}</p>
        <div style={{
          fontSize: 12, color: 'var(--fg-3)', marginTop: 10,
          fontFamily: 'Inter', fontFeatureSettings: '"tnum" 1',
        }}>{date} · {readTime}분</div>
      </div>
    </a>
  );
}
window.PostListItem = PostListItem;

</script>

  <script type="text/babel">
    const PROJECTS = [
      { kicker: 'TOSS-CLONE', title: 'Train Reservation', description: 'KTX 예약 화면을 React + TS로 다시 만든 토스 면접 과제예요.', tags: ['React', 'TypeScript'], year: '2025' },
      { kicker: 'OSS', title: 'Cream', description: 'Kream의 핵심 화면을 따라 만들면서 정리한 마켓플레이스 클론.', tags: ['Next.js'], year: '2024' },
      { kicker: 'GAME', title: 'Web Game', description: 'TypeScript로 만든 작은 브라우저 미니 게임. 캔버스만 사용.', tags: ['Canvas', 'TS'], year: '2024' },
      { kicker: 'STUDY', title: 'Quant Trading', description: '백테스트와 전략 시뮬레이션을 정리한 학습용 레포.', tags: ['Python'], year: '2023' },
    ];
    const POSTS = [
      { title: '왜 토스 블루를 피했을까', excerpt: '개인 브랜드는 친근함을 살짝 비틀어 만들어요. 색을 고르며 배운 것들.', date: '2026.04.20', readTime: 4 },
      { title: '에러 메시지를 다시 쓰는 법', excerpt: '"오류가 발생했습니다"는 사용자에게 어떤 도움도 되지 않아요.', date: '2026.04.05', readTime: 6 },
      { title: '한 화면, 한 액션', excerpt: '디자인 결정의 80%는 무엇을 빼냐에 달려 있다고 생각해요.', date: '2026.03.18', readTime: 5 },
    ];

    function HomeScreen({ onNav }) {
      return (
        <main>
          <Hero />
          <div className="section-title">최근 프로젝트</div>
          <div className="grid-2">
            {PROJECTS.slice(0, 2).map(p => <ProjectCard key={p.title} {...p} />)}
          </div>
          <div className="section-title">최근 글</div>
          <div>
            {POSTS.slice(0, 3).map(p => <PostListItem key={p.title} {...p} />)}
          </div>
        </main>
      );
    }

    function ProjectsScreen() {
      const [filter, setFilter] = React.useState('all');
      return (
        <main>
          <h1 style={{ fontSize: 36, letterSpacing: '-0.02em', margin: '64px 0 8px' }}>Projects</h1>
          <p style={{ color: 'var(--fg-2)', marginTop: 0 }}>지금까지 만든 사이드 프로젝트들이에요.</p>
          <div className="filter-bar" style={{ marginTop: 32 }}>
            {['all', 'React', 'TypeScript', 'Next.js'].map(f => (
              <button key={f} className={filter === f ? 'active' : ''} onClick={() => setFilter(f)}>{f === 'all' ? '전체' : f}</button>

          <div className="grid-2">
            {PROJECTS.filter(p => filter === 'all' || p.tags.includes(filter)).map(p => <ProjectCard key={p.title} {...p} />)}

      );
    }

    function WritingScreen() {
      return (
        <main>
          <h1 style={{ fontSize: 36, letterSpacing: '-0.02em', margin: '64px 0 8px' }}>Writing</h1>
          <p style={{ color: 'var(--fg-2)', marginTop: 0 }}>디자인과 프론트엔드에 대한 짧은 글들이에요.</p>
          <div style={{ marginTop: 24 }}>
            {POSTS.map(p => <PostListItem key={p.title} {...p} />)}
          </div>
        </main>
      );
    }

    function AboutScreen() {
      return (
        <main style={{ maxWidth: 680 }}>
          <h1 style={{ fontSize: 36, letterSpacing: '-0.02em', margin: '64px 0 24px' }}>About</h1>
          <p style={{ fontSize: 17, lineHeight: 1.7, color: 'var(--fg-1)' }}>
            안녕하세요, <strong>코리안심슨</strong>이에요. 서울에서 프론트엔드를 만들어요.
            인터페이스에서 군더더기를 덜어내는 일을 좋아하고,
            토스의 UX 라이팅 원칙을 사이드 프로젝트에 자주 빌려와요.
          </p>
          <p style={{ fontSize: 17, lineHeight: 1.7, color: 'var(--fg-2)' }}>
            React, TypeScript, 그리고 디자인 시스템에 관심이 많아요.

            <div style={{ fontSize: 13, color: 'var(--fg-3)', marginBottom: 8 }}>연락처</div>
            <div style={{ fontFamily: 'Inter', fontSize: 15 }}>hello@ninezerochan.dev</div>
          </div>
        </main>
      );
    }

    function App() {
      const [route, setRoute] = React.useState('home');
      return (
        <>
          <Header route={route} onNav={setRoute} />
          {route === 'home' && <HomeScreen onNav={setRoute} />}
          {route === 'projects' && <ProjectsScreen />}
          {route === 'writing' && <WritingScreen />}
          {route === 'about' && <AboutScreen />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
