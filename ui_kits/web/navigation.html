<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Navigation · 코리안심슨 Design System</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="icon" href="../../assets/logo.svg">
  <style>
    body { margin: 0; }
    main { max-width: 1080px; margin: 0 auto; padding: 56px 24px 96px; }
    .page-h { font-size: 36px; line-height: 1.2; letter-spacing: -0.02em; font-weight: 700; margin: 0 0 8px; }
    .page-sub { color: var(--fg-2); margin: 0 0 36px; font-size: 16px; }
    .toc { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:48px; padding:14px; background:var(--bg-2); border-radius:12px; border:1px solid var(--border-1); }
    .toc a { font-size:12px; padding:5px 10px; border-radius:999px; text-decoration:none; color:var(--fg-2); background:var(--bg-1); border:1px solid var(--border-1); }
    .toc a:hover { background: var(--gray-100); }
    .sec { padding: 28px 0 8px; border-top: 1px solid var(--border-1); margin-top: 36px; }
    .sec:first-of-type { border-top: none; margin-top: 0; padding-top: 0; }
    .sec h2 { font-size: 22px; letter-spacing: -0.01em; margin: 0 0 4px; font-weight: 600; }
    .sec .kicker { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 8px; }
    .sec p.lead { color: var(--fg-2); margin: 0 0 20px; font-size: 14px; }
    .demo { padding: 24px; border: 1px solid var(--border-1); border-radius: 12px; background: var(--bg-1); }
    .row { display: flex; gap: 18px; flex-wrap: wrap; align-items: flex-start; }
    .label-mini { font-size: 11px; color: var(--fg-3); margin-bottom: 8px; letter-spacing: 0.04em; text-transform: uppercase; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
// Navigation.jsx — Anchor, Breadcrumb, Dropdown, Menu, Pagination, Steps, Tabs
const NC = {
  primary: 'var(--primary-500)', primary600: 'var(--primary-600)', primary50: 'var(--primary-50)',
  fg1: 'var(--fg-1)', fg2: 'var(--fg-2)', fg3: 'var(--fg-3)',
  bg1: 'var(--bg-1)', bg2: 'var(--bg-2)',
  border1: 'var(--border-1)', border2: 'var(--border-2)',
  ring: '0 0 0 3px rgba(245,158,11,.25)',
};

// ---------- Tabs ----------
function Tabs({ value, onChange, items, variant = 'line' }) {
  const isLine = variant === 'line';
  return (
    <div>
      <div style={{
        display: 'flex', gap: isLine ? 4 : 6,
        borderBottom: isLine ? `1px solid ${NC.border1}` : 'none',
        padding: isLine ? 0 : 3,
        background: isLine ? 'transparent' : NC.bg2,
        border: isLine ? 'none' : `1px solid ${NC.border1}`,
        borderRadius: isLine ? 0 : 10, width: isLine ? 'auto' : 'fit-content',
      }}>
        {items.map(it => {
          const active = value === it.key;
          return (
            <button key={it.key} onClick={() => onChange?.(it.key)} style={{
              position: 'relative', padding: isLine ? '10px 14px' : '7px 14px',
              border: 'none', background: isLine ? 'transparent' : (active ? NC.bg1 : 'transparent'),
              color: active ? NC.fg1 : NC.fg2,
              fontFamily: 'var(--font-sans)', fontSize: 14,
              fontWeight: active ? 600 : 500, cursor: 'pointer',
              borderRadius: isLine ? 0 : 7,
              boxShadow: !isLine && active ? '0 1px 2px rgba(9,9,11,.06)' : 'none',
              transition: 'all 150ms',
            }}>
              {it.label}
              {isLine && active && (
                <span style={{ position: 'absolute', left: 0, right: 0, bottom: -1, height: 2, background: NC.primary, borderRadius: 999 }}/>
              )}
            </button>
          );
        })}
      </div>
      <div style={{ padding: '20px 4px', fontSize: 14, color: NC.fg2 }}>
        {items.find(i => i.key === value)?.content}
      </div>
    </div>
  );
}

// ---------- Steps ----------
function Steps({ current, items, direction = 'horizontal' }) {
  if (direction === 'vertical') {
    return (
      <div style={{ display: 'flex', flexDirection: 'column' }}>
        {items.map((it, i) => {
          const done = i < current, active = i === current;
          return (
            <div key={i} style={{ display: 'flex', gap: 14, paddingBottom: i === items.length - 1 ? 0 : 20, position: 'relative' }}>
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                <div style={{
                  width: 28, height: 28, borderRadius: '50%',
                  background: done ? NC.primary : active ? NC.bg1 : NC.bg1,
                  border: `1.5px solid ${done || active ? NC.primary : NC.border2}`,
                  color: done ? '#fff' : active ? NC.primary600 : NC.fg3,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 13, fontWeight: 600, fontFamily: 'Inter', flexShrink: 0,
                }}>
                  {done ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg> : i + 1}
                </div>
                {i < items.length - 1 && (
                  <div style={{ width: 1.5, flex: 1, background: done ? NC.primary : NC.border1, marginTop: 4, minHeight: 24 }}/>
                )}
              </div>
              <div style={{ paddingTop: 3, paddingBottom: 8 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: active || done ? NC.fg1 : NC.fg3 }}>{it.title}</div>
                {it.desc && <div style={{ fontSize: 12, color: NC.fg3, marginTop: 2 }}>{it.desc}</div>}
              </div>
            </div>
          );
        })}
      </div>
    );
  }
  return (
    <div style={{ display: 'flex', alignItems: 'flex-start', gap: 0, width: '100%' }}>
      {items.map((it, i) => {
        const done = i < current, active = i === current;
        return (
          <React.Fragment key={i}>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, flex: 'none', minWidth: 80 }}>
              <div style={{
                width: 28, height: 28, borderRadius: '50%',
                background: done ? NC.primary : NC.bg1,
                border: `1.5px solid ${done || active ? NC.primary : NC.border2}`,
                color: done ? '#fff' : active ? NC.primary600 : NC.fg3,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 13, fontWeight: 600, fontFamily: 'Inter',
              }}>
                {done ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg> : i + 1}
              </div>
              <div style={{ fontSize: 13, fontWeight: active || done ? 600 : 500, color: active || done ? NC.fg1 : NC.fg3, textAlign: 'center' }}>{it.title}</div>
            </div>
            {i < items.length - 1 && (
              <div style={{ flex: 1, height: 1.5, background: done ? NC.primary : NC.border1, marginTop: 14, minWidth: 30 }}/>
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

// ---------- Pagination ----------
function Pagination({ current, total, pageSize = 10, onChange }) {
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  const pages = [];
  const add = (p) => pages.push(p);
  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) add(i);
  } else {
    add(1);
    if (current > 3) add('…');
    const start = Math.max(2, current - 1), end = Math.min(totalPages - 1, current + 1);
    for (let i = start; i <= end; i++) add(i);
    if (current < totalPages - 2) add('…');
    add(totalPages);
  }
  const btn = (active, disabled) => ({
    minWidth: 36, height: 36, padding: '0 10px',
    border: `1px solid ${active ? NC.primary : NC.border2}`,
    borderRadius: 10, background: active ? NC.primary : NC.bg1,
    color: active ? '#fff' : disabled ? NC.fg3 : NC.fg1,
    fontFamily: 'Inter', fontFeatureSettings: '"tnum" 1', fontSize: 13, fontWeight: active ? 600 : 500,
    cursor: disabled ? 'not-allowed' : 'pointer', opacity: disabled ? 0.5 : 1,
    transition: 'all 150ms', display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
  });
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
      <button disabled={current === 1} onClick={() => onChange?.(current - 1)} style={btn(false, current === 1)}>‹</button>
      {pages.map((p, i) => p === '…' ?
        <span key={i} style={{ color: NC.fg3, padding: '0 4px' }}>…</span> :
        <button key={i} onClick={() => onChange?.(p)} style={btn(p === current, false)}>{p}</button>
      )}
      <button disabled={current === totalPages} onClick={() => onChange?.(current + 1)} style={btn(false, current === totalPages)}>›</button>
      <span style={{ marginLeft: 12, fontSize: 13, color: NC.fg3, fontFamily: 'Inter', fontFeatureSettings: '"tnum" 1' }}>
        총 {total}개 중 {(current - 1) * pageSize + 1}–{Math.min(current * pageSize, total)}
      </span>
    </div>
  );
}

// ---------- Breadcrumb ----------
function Breadcrumb({ items }) {
  return (
    <nav style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, fontFamily: 'var(--font-sans)' }}>
      {items.map((it, i) => (
        <React.Fragment key={i}>
          {i > 0 && <span style={{ color: NC.fg3 }}>/</span>}
          {i === items.length - 1 ? (
            <span style={{ color: NC.fg1, fontWeight: 500 }}>{it.label}</span>
          ) : (
            <a href="#" onClick={e => e.preventDefault()} style={{ color: NC.fg2, textDecoration: 'none' }}
              onMouseEnter={e => e.currentTarget.style.color = NC.primary600}
              onMouseLeave={e => e.currentTarget.style.color = NC.fg2}>{it.label}</a>
          )}
        </React.Fragment>
      ))}
    </nav>
  );
}

// ---------- Dropdown ----------
function Dropdown({ trigger, items, onSelect }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  return (
    <div ref={ref} style={{ position: 'relative', display: 'inline-block' }}>
      <button onClick={() => setOpen(!open)} style={{
        height: 40, padding: '0 14px', display: 'inline-flex', alignItems: 'center', gap: 8,
        background: NC.bg1, color: NC.fg1, border: `1px solid ${NC.border2}`, borderRadius: 10,
        fontFamily: 'var(--font-sans)', fontSize: 14, fontWeight: 500, cursor: 'pointer',
      }}>
        {trigger}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ color: NC.fg3, transform: open ? 'rotate(180deg)' : 'none', transition: 'transform 200ms' }}><path d="m6 9 6 6 6-6"/></svg>
      </button>
      {open && (
        <div style={{
          position: 'absolute', top: 'calc(100% + 4px)', left: 0, zIndex: 10, minWidth: 180,
          background: NC.bg1, border: `1px solid ${NC.border1}`, borderRadius: 12,
          boxShadow: '0 4px 12px rgba(9,9,11,.06)', padding: 4,
        }}>
          {items.map((it, i) => it.divider ? (
            <div key={i} style={{ height: 1, background: NC.border1, margin: '4px 0' }}/>
          ) : (
            <button key={i} onClick={() => { onSelect?.(it.key); setOpen(false); }}
              onMouseEnter={e => e.currentTarget.style.background = NC.bg2}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
              disabled={it.disabled}
              style={{
                width: '100%', padding: '9px 12px', textAlign: 'left',
                background: 'transparent', border: 'none', borderRadius: 8,
                fontFamily: 'var(--font-sans)', fontSize: 14,
                color: it.danger ? '#EF4444' : it.disabled ? NC.fg3 : NC.fg1,
                cursor: it.disabled ? 'not-allowed' : 'pointer',
                display: 'flex', alignItems: 'center', gap: 10,
              }}>
              {it.icon && <span style={{ display: 'inline-flex', color: it.danger ? '#EF4444' : NC.fg2 }}>{it.icon}</span>}
              {it.label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ---------- Menu (sidebar, with submenus) ----------
function Menu({ value, onChange, items }) {
  const [openKeys, setOpenKeys] = React.useState({});
  const toggle = (k) => setOpenKeys({ ...openKeys, [k]: !openKeys[k] });

  const renderItem = (it, depth = 0) => {
    if (it.children) {
      const open = !!openKeys[it.key];
      return (
        <div key={it.key}>
          <button onClick={() => toggle(it.key)} style={{
            width: '100%', display: 'flex', alignItems: 'center', gap: 10,
            padding: `9px ${12 + depth * 16}px`, background: 'transparent', border: 'none',
            borderRadius: 8, color: NC.fg1, fontFamily: 'var(--font-sans)',
            fontSize: 14, fontWeight: 500, cursor: 'pointer',
          }}
          onMouseEnter={e => e.currentTarget.style.background = NC.bg2}
          onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
            {it.icon && <span style={{ display: 'inline-flex', color: NC.fg2 }}>{it.icon}</span>}
            <span style={{ flex: 1, textAlign: 'left' }}>{it.label}</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ color: NC.fg3, transform: open ? 'rotate(180deg)' : 'none', transition: 'transform 200ms' }}><path d="m6 9 6 6 6-6"/></svg>
          </button>
          {open && <div>{it.children.map(c => renderItem(c, depth + 1))}</div>}
        </div>
      );
    }
    const active = value === it.key;
    return (
      <button key={it.key} onClick={() => onChange?.(it.key)} style={{
        width: '100%', display: 'flex', alignItems: 'center', gap: 10,
        padding: `9px ${12 + depth * 16}px`,
        background: active ? NC.primary50 : 'transparent', border: 'none',
        borderRadius: 8, color: active ? NC.primary600 : NC.fg1,
        fontFamily: 'var(--font-sans)', fontSize: 14, fontWeight: active ? 600 : 500,
        cursor: 'pointer', textAlign: 'left', position: 'relative',
      }}
      onMouseEnter={e => { if (!active) e.currentTarget.style.background = NC.bg2; }}
      onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'transparent'; }}>
        {it.icon && <span style={{ display: 'inline-flex', color: active ? NC.primary600 : NC.fg2 }}>{it.icon}</span>}
        <span style={{ flex: 1 }}>{it.label}</span>
        {it.badge && (
          <span style={{ fontSize: 11, padding: '1px 7px', borderRadius: 999, background: it.badgeColor || NC.primary, color: '#fff', fontWeight: 600 }}>{it.badge}</span>
        )}
      </button>
    );
  };

  return (
    <nav style={{
      width: 240, padding: 8, background: NC.bg1,
      border: `1px solid ${NC.border1}`, borderRadius: 12,
      display: 'flex', flexDirection: 'column', gap: 2,
    }}>
      {items.map(it => renderItem(it))}
    </nav>
  );
}

// ---------- Anchor (in-page nav) ----------
function Anchor({ items, active, onChange }) {
  return (
    <nav style={{ display: 'flex', flexDirection: 'column', gap: 2, borderLeft: `1.5px solid ${NC.border1}`, paddingLeft: 0 }}>
      {items.map(it => {
        const isActive = active === it.key;
        return (
          <a key={it.key} href={`#${it.key}`} onClick={(e) => { e.preventDefault(); onChange?.(it.key); }}
            style={{
              padding: '6px 14px', fontSize: 13, textDecoration: 'none',
              color: isActive ? NC.primary600 : NC.fg2,
              fontWeight: isActive ? 600 : 500,
              borderLeft: `2px solid ${isActive ? NC.primary : 'transparent'}`,
              marginLeft: -1.5, transition: 'all 150ms',
            }}>
            {it.label}
          </a>
        );
      })}
    </nav>
  );
}

Object.assign(window, {
  KsTabs: Tabs, KsSteps: Steps, KsPagination: Pagination,
  KsBreadcrumb: Breadcrumb, KsDropdown: Dropdown, KsMenu: Menu, KsAnchor: Anchor,
});

</script>
  <script type="text/babel">
    const SECTIONS = [['breadcrumb','Breadcrumb'],['tabs','Tabs'],['steps','Steps'],['pagination','Pagination'],['dropdown','Dropdown'],['menu','Menu'],['anchor','Anchor']];

    function Section({ id, title, kicker, lead, children }) {
      return (
        <section id={id} className="sec">
          <div className="kicker">{kicker}</div>
          <h2>{title}</h2>
          {lead && <p className="lead">{lead}</p>}
          <div className="demo">{children}</div>
        </section>
      );
    }

    const Icon = ({ d, ...rest }) => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" {...rest}>{d}</svg>
    );
    const HomeI = <Icon d={<><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>}/>;
    const FolderI = <Icon d={<path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/>}/>;
    const InboxI = <Icon d={<><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11Z"/></>}/>;
    const SettingsI = <Icon d={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/></>}/>;
    const LogoutI = <Icon d={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>}/>;
    const TrashI = <Icon d={<><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>}/>;
    const EditI = <Icon d={<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>}/>;

    function App() {
      const [tab, setTab] = React.useState('overview');
      const [tab2, setTab2] = React.useState('day');
      const [step, setStep] = React.useState(1);
      const [page, setPage] = React.useState(3);
      const [menuKey, setMenuKey] = React.useState('inbox');
      const [anchor, setAnchor] = React.useState('breadcrumb');

      return (
        <main>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 8 }}>
            <img src="../../assets/logo.svg" width="28" height="28" alt=""/>
            <span style={{ fontSize: 12, color: 'var(--fg-3)', letterSpacing: '0.04em' }}>코리안심슨 · NAVIGATION</span>
          </div>
          <h1 className="page-h">길을 알려주는 7가지 방법</h1>
          <p className="page-sub">Ant Design Navigation 카테고리. 사용자가 어디 있고 어디로 갈 수 있는지 명확히.</p>

          <nav className="toc">{SECTIONS.map(([id, label]) => <a key={id} href={`#${id}`}>{label}</a>)}</nav>

          <Section id="breadcrumb" kicker="01" title="Breadcrumb" lead="현재 위치를 계층으로 보여줘요. 마지막은 링크가 아니에요.">
            <KsBreadcrumb items={[
              { label: '홈' }, { label: '프로젝트' }, { label: 'Train Reservation' }, { label: '디자인 노트' },
            ]}/>
          </Section>

          <Section id="tabs" kicker="02" title="Tabs" lead="라인형 / 세그먼티드 두 변형.">
            <div className="row">
              <div style={{ flex: 1, minWidth: 320 }}>
                <div className="label-mini">Line</div>
                <KsTabs value={tab} onChange={setTab} items={[
                  { key: 'overview', label: '개요', content: '프로젝트의 전체 구조와 배경을 정리한 화면이에요.' },
                  { key: 'design', label: '디자인', content: '컬러·타입·간격 토큰 결정 과정을 모았어요.' },
                  { key: 'code', label: '코드', content: 'React 컴포넌트 구조와 폴더 규칙을 설명해요.' },
                ]}/>
              </div>
              <div style={{ flex: 1, minWidth: 320 }}>
                <div className="label-mini">Segmented (capsule)</div>
                <KsTabs value={tab2} onChange={setTab2} variant="capsule" items={[
                  { key: 'day', label: '일간', content: '오늘 하루의 작업 로그를 모아 보여줘요.' },
                  { key: 'week', label: '주간', content: '이번 주 동안 머지된 PR과 진행 중인 이슈예요.' },
                  { key: 'month', label: '월간', content: '월별 통계와 회고 메모를 한눈에.' },
                ]}/>
              </div>
            </div>
          </Section>

          <Section id="steps" kicker="03" title="Steps" lead="과정 안내. 가로·세로 모두 지원.">
            <div className="row" style={{ gap: 32 }}>
              <div style={{ flex: 1, minWidth: 360 }}>
                <div className="label-mini">Horizontal</div>
                <KsSteps current={step} items={[
                  { title: '계정 만들기' }, { title: '프로필 작성' }, { title: '관심사 선택' }, { title: '시작하기' },
                ]}/>
                <div style={{ display: 'flex', gap: 8, marginTop: 18 }}>
                  <button onClick={() => setStep(Math.max(0, step - 1))} style={navBtn(false)}>이전</button>
                  <button onClick={() => setStep(Math.min(3, step + 1))} style={navBtn(true)}>다음</button>
                </div>
              </div>
              <div style={{ flex: 1, minWidth: 240 }}>
                <div className="label-mini">Vertical</div>
                <KsSteps current={2} direction="vertical" items={[
                  { title: '주문 접수', desc: '4월 28일 오전 9:12' },
                  { title: '결제 완료', desc: '4월 28일 오전 9:13' },
                  { title: '배송 준비 중', desc: '예상: 오늘 안에' },
                  { title: '배송 완료' },
                ]}/>
              </div>
            </div>
          </Section>

          <Section id="pagination" kicker="04" title="Pagination" lead="총 개수와 현재 범위를 함께 보여줘요. 숫자는 tabular nums.">
            <KsPagination current={page} total={184} pageSize={10} onChange={setPage}/>
          </Section>

          <Section id="dropdown" kicker="05" title="Dropdown" lead="버튼에서 추가 액션 메뉴를 펼쳐요.">
            <div className="row" style={{ gap: 16 }}>
              <KsDropdown trigger="더 보기" items={[
                { key: 'edit', label: '수정', icon: EditI },
                { key: 'duplicate', label: '복제' },
                { divider: true },
                { key: 'archive', label: '보관함으로 옮기기', disabled: true },
                { key: 'delete', label: '삭제', icon: TrashI, danger: true },
              ]} onSelect={(k) => console.log('selected', k)}/>
              <KsDropdown trigger="koreasimpson" items={[
                { key: 'profile', label: '내 프로필' },
                { key: 'settings', label: '설정', icon: SettingsI },
                { divider: true },
                { key: 'logout', label: '로그아웃', icon: LogoutI },
              ]}/>
            </div>
          </Section>

          <Section id="menu" kicker="06" title="Menu" lead="사이드바 네비게이션. 서브메뉴 펼치기와 뱃지 지원.">
            <KsMenu value={menuKey} onChange={setMenuKey} items={[
              { key: 'home', label: '홈', icon: HomeI },
              { key: 'inbox', label: '받은 편지함', icon: InboxI, badge: 12 },
              {
                key: 'projects', label: '프로젝트', icon: FolderI,
                children: [
                  { key: 'train', label: 'Train Reservation' },
                  { key: 'cream', label: 'Cream' },
                  { key: 'webgame', label: 'Web Game' },
                ],
              },
              { key: 'settings', label: '설정', icon: SettingsI },
            ]}/>
          </Section>

          <Section id="anchor" kicker="07" title="Anchor" lead="긴 페이지의 섹션 점프. 활성 섹션은 마리골드 바로 강조.">
            <div className="row" style={{ alignItems: 'flex-start' }}>
              <div style={{ flex: '0 0 200px' }}>
                <KsAnchor active={anchor} onChange={setAnchor} items={[
                  { key: 'breadcrumb', label: 'Breadcrumb' },
                  { key: 'tabs', label: 'Tabs' },
                  { key: 'steps', label: 'Steps' },
                  { key: 'pagination', label: 'Pagination' },
                  { key: 'dropdown', label: 'Dropdown' },
                  { key: 'menu', label: 'Menu' },
                ]}/>
              </div>
              <div style={{ flex: 1, padding: 16, background: 'var(--bg-2)', borderRadius: 8, fontSize: 13, color: 'var(--fg-2)' }}>
                현재 활성 섹션: <strong style={{ color: 'var(--fg-1)' }}>{anchor}</strong>
              </div>
            </div>
          </Section>
        </main>
      );
    }

    const navBtn = (primary) => ({
      height: 36, padding: '0 14px',
      background: primary ? 'var(--primary-500)' : 'var(--bg-1)',
      color: primary ? '#fff' : 'var(--fg-1)',
      border: primary ? 'none' : '1px solid var(--border-2)',
      borderRadius: 10, fontFamily: 'var(--font-sans)', fontSize: 13, fontWeight: 600, cursor: 'pointer',
    });

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
